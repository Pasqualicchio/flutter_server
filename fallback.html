<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>🔴 Risorsa non trovata</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 50px;
      background-color: #f8f9fa;
    }
    h1 {
      font-size: 50px;
      color: #dc3545;
    }
    p {
      font-size: 20px;
      color: #6c757d;
    }
    .button {
      padding: 10px 20px;
      margin-top: 20px;
      background-color: #007bff;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
    .button:hover {
      background-color: #0056b3;
    }
  </style>
</head>
<body>
  <h1>🔴 Errore di connessione</h1>
  <p>Impossibile caricare la risorsa. Sei offline o la risorsa non è disponibile.</p>
  <button class="button" onclick="window.location.reload()">Riprova</button>
</body>
</html>
