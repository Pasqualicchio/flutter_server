ad<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>
  <link rel="icon" href="/static/favicon.ico" type="image/x-icon">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div class="container">
    <h2>🔐 Login</h2>
    <form method="POST" action="/login">
      <!-- Username -->
      <label for="username">Username:</label><br>
      <input type="text" id="username" name="username" autocomplete="username" required><br><br>

      <!-- Password -->
      <label for="password">Password:</label><br>
      <input type="password" id="password" name="password" autocomplete="current-password" required><br><br>

      <!-- Login Button -->
      <button type="submit" class="btn btn-primary">Accedi</button>
    </form>
    <p>Non hai un account? <a href="/register">Registrati qui</a>.</p>
  </div>

  <!-- Bootstrap JS (optional) -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
