<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#0d6efd">
  <title>Benvenuto - Photo Logger</title>

  <!-- PWA Manifest -->
  <link rel="manifest" href="/manifest.json">
  
  <!-- Apple Icon -->
  <link rel="apple-touch-icon" href="/static/apple-touch-icon.png">
  
  <!-- Bootstrap CSS -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  
  <style>
    body {
      background-color: #f4f4f9;
    }
    .container {
      margin-top: 50px;
    }
    .btn-custom {
      background-color: #0d6efd;
      color: white;
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="text-center">
      <h1 class="display-4">Benvenuto nel Photo Logger!</h1>
      <p class="lead">Carica facilmente foto e gestisci il tuo archivio.</p>
      
      <!-- Pulsante per navigare alla pagina di upload -->
      <a href="/upload_advanced_ui" class="btn btn-custom btn-lg">📤 Carica una Nuova Immagine</a>
 Carica una Nuova Immagine</a>
 

      <!-- Pulsante per navigare alla pagina di browsing -->
      <a href="/browse-ui" class="btn btn-secondary btn-lg mt-3">📂 Esplora File Caricati</a>
    </div>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

  <!-- Service Worker PWA -->
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/static/service-worker.js')
        .then(() => console.log('Service Worker registrato con successo'))
        .catch(err => console.error('Errore registrazione Service Worker:', err));
    }
  </script>

</body>
</html>
