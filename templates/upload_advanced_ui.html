<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📤 Upload Avanzato con Anteprima</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <style>
        /* Aggiungi qui il tuo CSS */
        body {
            background-color: #f8f9fa;
            padding-top: 20px;
        }

        .card {
            border-radius: 10px;
            box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.1);
        }

        .card-header {
            background-color: #007bff;
            color: white;
            font-size: 1.5rem;
        }

        .form-label {
            font-weight: bold;
        }

        .form-control, .form-select {
            border-radius: 8px;
            box-shadow: none;
            margin-bottom: 15px;
        }

        .btn-success {
            background-color: #28a745;
            color: white;
            border-radius: 8px;
            padding: 10px 20px;
            border: none;
            cursor: pointer;
            font-size: 16px;
        }

        .btn-success:hover {
            background-color: #218838;
        }

        /* Immagine in anteprima */
        .thumb {
            height: 150px;
            object-fit: cover;
        }

        /* Transizione per ogni file caricato */
        .file-entry {
            transition: all 0.2s ease;
        }

        .file-entry:hover {
            background-color: #f8f9fa;
        }

        /* Aggiungi la zona di drop */
        .dropzone {
            border: 2px dashed #6c757d;
            border-radius: 0.5rem;
            padding: 2rem;
            text-align: center;
            color: #6c757d;
            margin-bottom: 2rem;
            transition: background-color 0.3s ease;
        }

        .dropzone.dragover {
            background-color: #e9ecef;
        }

        /* Barra di progresso */
        #progressBar {
            height: 20px;
            margin-top: 1rem;
            display: none;
        }

        /* Icona di anteprima */
        .icon-preview {
            font-size: 3rem;
            margin-bottom: 1rem;
        }

        /* Responsive settings */
        @media (max-width: 576px) {
            .container {
                padding: 15px;
            }
            .form-control, .form-select {
                width: 100%;
            }
            .card {
                margin: 10px 0;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Card principale -->
        <div class="card">
            <div class="card-header">
                <i class="fas fa-cloud-upload-alt"></i> 📤 Upload Avanzato con Anteprima
            </div>
            <div class="card-body">
                <!-- Link per tornare alla pagina principale -->
                <a href="/" class="btn btn-outline-primary mb-3"><i class="fas fa-arrow-left"></i> Torna alla pagina iniziale</a>

                <!-- Form di upload -->
                <form id="uploadForm" method="POST" enctype="multipart/form-data" action="/upload">
                    <!-- Macro categoria -->
                    <div class="mb-3">
                        <label for="macro" class="form-label">Macro Categoria</label>
                        <select class="form-select" name="macro" id="macroSelect" required>
                            <option>00 = Rilievi</option>
                            <option>01 = Produzione</option>
                            <option>02 = As build</option>
                            <option>03 = Spedizione</option>
                            <option>04 = Montaggio</option>
                            <option>05 = Funzionamento</option>
                            <option>06 = Inconvenienti</option>
                            <option>07 = Magazzino</option>
                            <option>08 = Laboratorio</option>
                        </select>
                    </div>

                    <!-- Linea (visibile solo se "Funzionamento" è selezionato) -->
                    <div class="mb-3" id="lineaGroup" style="display: none;">
                        <label class="form-label">Linea</label>
                        <select class="form-select" name="linea" id="lineaSelect">
                            <option>FILM</option>
                            <option>PET</option>
                        </select>
                    </div>

                    <!-- Campi di testo -->
                    <div class="mb-3">
                        <label for="commessa" class="form-label">Commessa</label>
                        <input type="text" class="form-control" name="commessa" required>
                    </div>
                    <div class="mb-3">
                        <label for="matricola" class="form-label">Matricola</label>
                        <input type="text" class="form-control" name="matricola" required>
                    </div>
                    <div class="mb-3">
                        <label for="item" class="form-label">Item</label>
                        <input type="text" class="form-control" name="item" required>
                    </div>

                    <!-- Input per selezionare le immagini -->
                    <div class="mb-3">
                        <label class="form-label">Immagine</label>
                        <input class="form-control" type="file" name="image" id="imageInput" accept="image/*" multiple required>
                    </div>

                    <!-- Anteprima immagini -->
                    <div id="preview" class="d-flex flex-wrap mb-3"></div>

                    <!-- Pulsante di invio -->
                    <button type="submit" class="btn btn-success w-100">📤 Carica Immagine</button>
                </form>

                <!-- Alert area per notifiche -->
                <div id="alertArea"></div>
            </div>
        </div>
    </div>

    <!-- Script per anteprima e invio -->
    <script>
        const input = document.getElementById('imageInput');
        const preview = document.getElementById('preview');
        const form = document.getElementById('uploadForm');

        // Gestione della selezione delle immagini
        input.addEventListener('change', () => {
            preview.innerHTML = "";
            [...input.files].forEach(file => {
                const reader = new FileReader();
                reader.onload = e => {
                    const img = document.createElement("img");
                    img.src = e.target.result;
                    img.className = "thumb";
                    preview.appendChild(img);
                };
                reader.readAsDataURL(file);
            });
        });

        // Gestione del submit del form
        form.addEventListener('submit', function (e) {
            const alertBox = document.getElementById('alertArea');
            alertBox.innerHTML = `
                <div class="alert alert-success" role="alert">
                    ✅ Immagini caricate con successo!
                </div>`;
        });

        // Mostra il campo "Linea" se la categoria è "Funzionamento"
        document.getElementById("macroSelect").addEventListener("change", function () {
            document.getElementById("lineaGroup").style.display =
                this.value.includes("05 = Funzionamento") ? "block" : "none";
        });
    </script>

    <!-- Link a Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
